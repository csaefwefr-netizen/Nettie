<script>
/* =========================
   1. 随机化设置
========================= */
const jsPsych = initJsPsych();

// 0=相容先, 1=不相容先
const condition = (Math.random() < 0.5) ? 0 : 1;

/* =========================================================
   2. 自定义插件：IAT Corrected (保持原有逻辑)
========================================================= */
class IatCorrectedPlugin {
  constructor(jsPsych) {
    this.jsPsych = jsPsych;
  }

  trial(display_element, trial) {
    const fixation_ms = 250;
    const correct_key = trial.correct_key;

    display_element.innerHTML = `<div class="fix">+</div>`;

    this.jsPsych.pluginAPI.setTimeout(() => {
      
      const startTime = performance.now(); 

      const buildHtml = (showError) => `
        <div class="iat-wrap">
          <div class="iat-top">
            <div class="iat-label left">${trial.left_label}</div>
            <div class="iat-label right">${trial.right_label}</div>
          </div>
          
          <div class="iat-main-area">
              <div class="iat-center">${trial.stimulus}</div>
              <div class="err-box">
                ${showError ? '<div class="err">X</div>' : ''}
              </div>
              <div class="iat-hint ${showError ? 'visible' : ''}">
                 請按另一個鍵更正錯誤
              </div>
          </div>
        </div>
      `;

      display_element.innerHTML = buildHtml(false);

      const afterFirstResponse = (info) => {
        if (this.jsPsych.pluginAPI.compareKeys(info.key, correct_key)) {
          endTrial({
            rt: info.rt,              
            first_rt: info.rt,        
            correction_rt: null,      
            wrong: false
          });
        } else {
          display_element.innerHTML = buildHtml(true); 
          
          this.jsPsych.pluginAPI.getKeyboardResponse({
            callback_function: (info2) => {
              endTrial({
                rt: info2.rt,         
                first_rt: info.rt,    
                correction_rt: info2.rt, 
                wrong: true
              });
            },
            valid_responses: [correct_key], 
            rt_method: 'performance',
            persist: false,
            allow_held_key: false
          });
        }
      };

      const endTrial = (dataObj) => {
        const total_duration = performance.now() - startTime;

        display_element.innerHTML = '';
        this.jsPsych.finishTrial({
          rt: dataObj.rt,                     
          correction_rt: dataObj.correction_rt, 
          first_rt: dataObj.first_rt,         
          total_time_from_start: total_duration, 
          
          correct: !dataObj.wrong,            
          response: dataObj.wrong ? 'correction' : 'correct', 
          stimulus: trial.stimulus,
          block: trial.block,
          trial_kind: trial.trial_kind,
          subcat: trial.subcat,
          participant_id: jsPsych.data.get().first().participant_id, 
          condition: condition === 0 ? "Compatible-First" : "Incompatible-First"
        });
      };

      this.jsPsych.pluginAPI.getKeyboardResponse({
        callback_function: afterFirstResponse,
        valid_responses:['f', 'j'],
        rt_method: 'performance',
        persist: false,
        allow_held_key: false
      });

    }, fixation_ms);
  }
}
IatCorrectedPlugin.info = {
  name: "iat-corrected",
  parameters: {
    stimulus: { type: jsPsychModule.ParameterType.HTML_STRING, default: undefined },
    left_label: { type: jsPsychModule.ParameterType.HTML_STRING, default: '' },
    right_label: { type: jsPsychModule.ParameterType.HTML_STRING, default: '' },
    correct_key: { type: jsPsychModule.ParameterType.KEY, default: undefined },
    block: { type: jsPsychModule.ParameterType.STRING, default: '' },
    trial_kind: { type: jsPsychModule.ParameterType.STRING, default: '' },
    subcat: { type: jsPsychModule.ParameterType.STRING, default: '' }
  }
};

/* =========================
   3. 辅助函数 (已重写：精准平衡 & 限制同键)
========================= */
function page(html){
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `<div class="page">${html}</div>`,
    choices: [' ']
  };
}

function box(text) { return `<span class="kbd">${text}</span>`; }
function redOr() { return `<span class="red-or">或</span>`; }

function shuffle(array) {
  let currentIndex = array.length, randomIndex;
  while (currentIndex != 0) {
    randomIndex = Math.floor(Math.random() * currentIndex);
    currentIndex--;
    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
  }
  return array;
}

// 【修改】精准数量抽样：均匀抽取补充，绝对保证数量 (例如40题各10个)
function sampleExactItems(items, count) {
  let result = [];
  let pool =[];
  while(result.length < count) {
    if(pool.length === 0) pool = shuffle([...items]);
    result.push(pool.pop());
  }
  return result;
}

// 【修改】序列生成：限制最多只能连续3次按同一个键
function shuffleNoMoreThan(array, maxConsecutive) {
  let bestArr = array;
  for (let attempt = 0; attempt < 500; attempt++) {
    let arr = shuffle([...array]);
    let valid = true;
    let count = 1;
    for (let i = 1; i < arr.length; i++) {
      if (arr[i].correct_key === arr[i - 1].correct_key) {
        count++;
        if (count > maxConsecutive) {
          valid = false;
          break;
        }
      } else {
        count = 1;
      }
    }
    if (valid) return arr;
    bestArr = arr;
  }
  return bestArr;
}

function downloadCSV(csv, filename) {
  const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

/* =========================
   4. 词汇材料 & 键位逻辑
========================= */
const words_AI =['自動評分','智能白板','AI備課','AI授課','人機交互','AI個性化推薦'];
const words_TR =['人工評分','粉筆黑板','人工備課','真人授課','師生互動','統一教材'];
const words_Pos =['高效的','專注的','輕鬆的','方便的','省時的','省力的','容易的','有序的'];
const words_Neg =['低效的','分心的','吃力的','麻煩的','耗時的','費力的','複雜的','混亂的'];

const key_Pos = 'f';
const key_Neg = 'j';
let key_AI_B1, key_TR_B1;
let txt_Left_B1, txt_Right_B1; 

if (condition === 0) {
  key_AI_B1 = 'f'; key_TR_B1 = 'j';
  txt_Left_B1 = "AI教學"; txt_Right_B1 = "傳統教學";
} else {
  key_AI_B1 = 'j'; key_TR_B1 = 'f';
  txt_Left_B1 = "傳統教學"; txt_Right_B1 = "AI教學";
}

const key_AI_B5 = (key_AI_B1 === 'f') ? 'j' : 'f';
const key_TR_B5 = (key_TR_B1 === 'f') ? 'j' : 'f';
const txt_Left_B5 = (txt_Left_B1 === "AI教學") ? "傳統教學" : "AI教學";
const txt_Right_B5 = (txt_Right_B1 === "AI教學") ? "傳統教學" : "AI教學";

/* =========================
   5. 试次生成器 (已重写：满足严格要求)
========================= */
function makeLabel(keyChar, text) {
  return `<span class="top-key">${keyChar.toUpperCase()}</span>：${text}`;
}

function createTrialObj(word, subcat, kind, correctKey, leftHtml, rightHtml, blockName) {
  return {
    stimulus: word, subcat: subcat, trial_kind: kind, correct_key: correctKey,
    left_label: leftHtml, right_label: rightHtml, block: blockName
  };
}

// Block 1 (单概念：各10题)
function getTrials_B1() {
  const l = makeLabel("F", txt_Left_B1);
  const r = makeLabel("J", txt_Right_B1);
  const count = 10;
  const t_AI = sampleExactItems(words_AI, count).map(w => createTrialObj(w, "AI", "concept", key_AI_B1, l, r, "B1_Concept"));
  const t_TR = sampleExactItems(words_TR, count).map(w => createTrialObj(w, "TRAD", "concept", key_TR_B1, l, r, "B1_Concept"));
  return shuffleNoMoreThan([...t_AI, ...t_TR], 3);
}

// Block 2 (单属性：各10题)
function getTrials_B2() {
  const l = makeLabel("F", "積極詞彙");
  const r = makeLabel("J", "消極詞彙");
  const count = 10;
  const t_Pos = sampleExactItems(words_Pos, count).map(w => createTrialObj(w, "POS", "attr", key_Pos, l, r, "B2_Attr"));
  const t_Neg = sampleExactItems(words_Neg, count).map(w => createTrialObj(w, "NEG", "attr", key_Neg, l, r, "B2_Attr"));
  return shuffleNoMoreThan([...t_Pos, ...t_Neg], 3);
}

// 联合阶段：精准各取 1/4，且严格交替 + 限制同键
function getTrials_Combined(phase, nTrials, blockName) {
  const curKeyAI = (phase === 1) ? key_AI_B1 : key_AI_B5;
  const curKeyTR = (phase === 1) ? key_TR_B1 : key_TR_B5;
  const isAIonF  = (curKeyAI === 'f');

  let leftTxt, rightTxt;
  if (isAIonF) {
    leftTxt = "AI教學 或 積極詞彙"; rightTxt = "傳統教學 或 消極詞彙";
  } else {
    leftTxt = "傳統教學 或 積極詞彙"; rightTxt = "AI教學 或 消極詞彙";
  }
  
  const l = makeLabel("F", leftTxt);
  const r = makeLabel("J", rightTxt);
  const countPerCat = Math.floor(nTrials / 4); // 比如40次，每个类就是精确的10个

  const t_AI  = sampleExactItems(words_AI, countPerCat).map(w => createTrialObj(w, "AI", "combined", curKeyAI, l, r, blockName));
  const t_TR  = sampleExactItems(words_TR, countPerCat).map(w => createTrialObj(w, "TRAD", "combined", curKeyTR, l, r, blockName));
  const t_Pos = sampleExactItems(words_Pos, countPerCat).map(w => createTrialObj(w, "POS", "combined", key_Pos, l, r, blockName));
  const t_Neg = sampleExactItems(words_Neg, countPerCat).map(w => createTrialObj(w, "NEG", "combined", key_Neg, l, r, blockName));

  let bestSeq =[];
  for(let attempt = 0; attempt < 500; attempt++) {
    let seq =[];
    let concepts = shuffle([...t_AI, ...t_TR]);
    let attrs = shuffle([...t_Pos, ...t_Neg]);
    
    let conceptFirst = (Math.random() < 0.5);
    let valid = true;
    let keyCount = 0;
    let lastKey = null;

    for(let i = 0; i < nTrials; i++) {
       let isConceptTurn = conceptFirst ? (i % 2 === 0) : (i % 2 !== 0);
       let item = isConceptTurn ? concepts[Math.floor(i/2)] : attrs[Math.floor(i/2)];
       seq.push(item);

       if (item.correct_key === lastKey) {
         keyCount++;
         if (keyCount > 3) {
           valid = false;
           break;
         }
       } else {
         keyCount = 1;
         lastKey = item.correct_key;
       }
    }
    if (valid) return seq; 
    bestSeq = seq;
  }
  return bestSeq;
}

// Block 5 (反转概念：各10题)
function getTrials_B5() {
  const l = makeLabel("F", txt_Left_B5);
  const r = makeLabel("J", txt_Right_B5);
  const count = 10;
  const t_AI = sampleExactItems(words_AI, count).map(w => createTrialObj(w, "AI", "concept", key_AI_B5, l, r, "B5_Reverse"));
  const t_TR = sampleExactItems(words_TR, count).map(w => createTrialObj(w, "TRAD", "concept", key_TR_B5, l, r, "B5_Reverse"));
  return shuffleNoMoreThan([...t_AI, ...t_TR], 3);
}

/* =========================

========================= */
let timeline =[];

// --- Part 1: 被试编号输入 ---

function getCombinedInstText(phase) {
  const curKeyAI = (phase === 1) ? key_AI_B1 : key_AI_B5;
  const leftConcept = (curKeyAI === 'f') ? "AI教學" : "傳統教學";
  const rightConcept = (curKeyAI === 'f') ? "傳統教學" : "AI教學";
  
  const leftStr = box(leftConcept) + redOr() + box('積極詞彙');
