<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港電車歷史練習</title>
    <style>
        /* --------------------------------
           温馨可爱风格 + 时间顺序回顾 + 手动进入 + 完成总结
           (功能不变，增加总结回顾)
           -------------------------------- */
        :root {
            --primary-color: #e58c7c;          /* 暖粉 */
            --primary-light: #ffe4de;           /* 淺粉白 */
            --text-main: #4a4a4a;               /* 柔和深灰 */
            --text-muted: #7a7a7a;               /* 中灰 */
            --bg-color: #fff1ed;                 /* 身體底色 */
            --white: #ffffff;
            --success: #95b88d;                   /* 柔和草綠 */
            --error: #e67e7e;                      /* 溫柔紅 */
            --candy-pink: #fec8c1;
            --candy-yellow: #fff3d4;
        }

        body {
            font-family: "PingFang SC", "Helvetica Neue", "Microsoft YaHei", "Noto Sans TC", "Comic Sans MS", cursive, sans-serif;
            background: linear-gradient(145deg, #ffe6df 0%, #ffd9e8 100%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 30px 30px, #ffb6aa 3px, transparent 3px);
            background-size: 80px 80px;
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            background-color: var(--white);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 15px 35px rgba(229, 140, 124, 0.2), 0 5px 12px rgba(0,0,0,0.05);
            padding: 40px;
            width: 100%;
            max-width: 800px;
            position: relative;
            overflow: visible;
            border: 2px solid #ffe1d4;
            z-index: 2;
            transition: box-shadow 0.3s;
        }

        .container:hover {
            box-shadow: 0 20px 40px rgba(229, 140, 124, 0.25);
        }

        .container::after {
            content: "🚃🚃🚃";
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 60px;
            opacity: 0.08;
            transform: rotate(-5deg);
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
            color: var(--primary-color);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px dashed #fec8c1;
            padding-bottom: 15px;
            position: relative;
            z-index: 5;
        }

        .header h1 {
            font-size: 28px;
            margin: 0;
            color: var(--primary-color);
            text-shadow: 2px 2px 0 #ffe4de;
            letter-spacing: 1px;
            display: inline-block;
        }

        .header h1::before {
            content: "🚋";
            font-size: 30px;
            margin-right: 8px;
            display: inline-block;
            vertical-align: middle;
            filter: drop-shadow(2px 2px 0 #ffe0d0);
        }

        .header h1::after {
            content: "⚡";
            font-size: 26px;
            margin-left: 8px;
            display: inline-block;
            vertical-align: middle;
            filter: drop-shadow(2px 2px 0 #ffe0d0);
        }

        .lang-btn {
            background: #ffe9e4;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 6px #fcd5cc;
        }

        .lang-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: #d47a6a;
            transform: scale(1.02);
            box-shadow: 0 8px 12px #ecc7bf;
        }

        /* Login Screen */
        .login-screen {
            text-align: center;
            padding: 40px 10px;
            position: relative;
            z-index: 5;
        }

        .login-screen h2 {
            color: #b37b6f;
            font-size: 22px;
            margin-bottom: 25px;
        }

        .login-screen input {
            padding: 14px 25px;
            font-size: 16px;
            border: 2px solid #fed7cf;
            border-radius: 50px;
            width: 60%;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s;
            background-color: #fffcfb;
            box-shadow: inset 0 2px 5px #ffe2da;
        }

        .login-screen input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 5px #fee3dc;
        }

        .btn {
            background: linear-gradient(145deg, #f6a89e, #e58c7c);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 8px 0 #b86b5c, 0 5px 20px #fbc5bb;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: linear-gradient(145deg, #e58c7c, #d47a6a);
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #a85b4e, 0 8px 25px #f7b4a8;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b86b5c, 0 5px 15px #fbc5bb;
        }

        /* 通用卡片樣式 */
        .student-name-display {
            font-size: 16px;
            color: #a57166;
            margin-bottom: 15px;
            background: #fff2e9;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 500;
            border: 1px solid #fcd2c5;
        }

        .section-title {
            font-size: 22px;
            color: #ce7d6b;
            margin-bottom: 5px;
            font-weight: 700;
            border-left: 12px solid #fec8c1;
            padding-left: 15px;
        }

        .section-desc {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 25px;
            background: #fff5f1;
            padding: 8px 18px;
            border-radius: 30px;
            display: inline-block;
        }

        /* Match Screen */
        .match-container {
            display: flex;
            gap: 20px;
            position: relative;
            z-index: 5;
        }

        .match-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .match-item {
            padding: 16px 18px;
            border: 2px solid #fbc5b9;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
            background-color: #fffbf9;
            line-height: 1.5;
            font-size: 15px;
            box-shadow: 0 4px 6px #ffe7e0;
            position: relative;
            z-index: 5;
        }

        .match-item:hover:not(.matched) {
            border-color: var(--primary-color);
            background-color: #fff1ec;
            transform: scale(1.01) translateY(-2px);
            box-shadow: 0 10px 15px #fad7cf;
        }

        .match-item.selected {
            border-color: #e58c7c;
            background-color: #ffe1d9;
            box-shadow: 0 0 0 4px #fee0d8, 0 8px 12px #fcc9bf;
        }

        .match-item.matched {
            border-color: var(--success);
            background-color: #eaf3e5;
            color: #618b54;
            cursor: not-allowed;
            opacity: 0.9;
            text-decoration: line-through 1px #a3c697;
            box-shadow: inset 0 2px 5px #d0e2c8;
        }

        /* 回顧區塊樣式 (用於時間線和選擇題總結) */
        .review-section {
            margin-top: 30px;
            padding: 20px 25px;
            background: #fff9f5;
            border-radius: 40px 40px 30px 30px;
            border: 2px dashed #fec8c1;
            box-shadow: 0 10px 20px #ffd9d0, inset 0 1px 5px white;
            position: relative;
            z-index: 10;
        }

        .review-title {
            font-size: 22px;
            color: #ce7d6b;
            margin-bottom: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .review-title::before {
            content: "📅";
            font-size: 26px;
        }

        .review-item {
            padding: 12px 20px;
            margin-bottom: 10px;
            background: white;
            border-radius: 60px;
            border: 1px solid #fbc5b9;
            font-size: 16px;
            box-shadow: 0 4px 8px #fee0d8;
            transition: all 0.2s;
            color: #5a4a45;
        }

        .review-item:hover {
            transform: translateX(5px);
            background: #fff4ee;
            border-color: #e58c7c;
        }

        /* 選擇題回顧特殊樣式 */
        .mcq-review-item {
            padding: 16px 20px;
            margin-bottom: 15px;
            background: #fffefd;
            border-radius: 30px;
            border: 2px solid #fbc5b9;
            box-shadow: 0 6px 10px #ffe7e0;
        }

        .mcq-review-question {
            font-weight: 600;
            color: #4e3f3b;
            margin-bottom: 8px;
            font-size: 17px;
        }

        .mcq-review-answer {
            color: #618b54;
            background: #eef7ea;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 40px;
            border: 1px solid #a3c697;
            font-size: 16px;
        }

        .mcq-review-answer::before {
            content: "✅ 正确答案：";
            font-weight: normal;
            color: #618b54;
        }

        /* 手動進入選擇題的按鈕容器 */
        .next-button-wrapper {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        /* MCQ Screen */
        .mcq-question {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.6;
            color: #4e3f3b;
            background: #fffaf7;
            padding: 20px 25px;
            border-radius: 40px 40px 40px 12px;
            border: 2px dashed #fbc5b9;
        }

        .mcq-options {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .mcq-option {
            padding: 16px 22px;
            border: 2px solid #fbc5b9;
            border-radius: 48px;
            cursor: pointer;
            transition: all 0.25s;
            background-color: #fffcfb;
            font-size: 16px;
            box-shadow: 0 4px 8px #ffe2da;
        }

        .mcq-option:hover {
            background-color: #fff1ec;
            border-color: var(--primary-color);
            transform: translateX(6px);
            box-shadow: 0 8px 12px #fccfc6;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--error);
            color: white;
            padding: 14px 30px;
            border-radius: 60px;
            box-shadow: 0 10px 20px rgba(230, 126, 126, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 2000;
            font-weight: bold;
            font-size: 16px;
            border: 3px solid #fff3e8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            top: 30px;
        }

        .toast.success {
            background-color: var(--success);
            box-shadow: 0 10px 20px rgba(149, 184, 141, 0.5);
        }

        .toast::before {
            content: "🚃";
            font-size: 22px;
            margin-right: 5px;
            filter: drop-shadow(0 2px 0 #fff);
        }

        .toast.success::before {
            content: "🎉";
        }

        /* 完成畫面 */
        .finish-container {
            text-align: left;
            padding: 20px 0;
        }

        .finish-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .finish-header h2 {
            color: var(--success);
            font-size: 36px;
            margin-bottom: 10px;
        }

        .finish-header p {
            font-size: 18px;
            background: #fff4e9;
            padding: 12px 25px;
            border-radius: 60px;
            display: inline-block;
            border: 2px solid #fec8c1;
        }

        .match-item:hover:not(.matched)::after {
            content: "💖";
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0.6;
        }

        #student-name-input::placeholder {
            color: #fbc2b5;
            font-style: italic;
            font-size: 14px;
        }

        .header::after {
            content: '';
            display: block;
            height: 4px;
            background: repeating-linear-gradient(90deg, #fec8c1 0px, #fec8c1 15px, transparent 15px, transparent 25px);
            width: 150px;
            position: absolute;
            bottom: -10px;
            right: 80px;
            border-radius: 2px;
        }

        .match-item, .mcq-option, .btn, .lang-btn {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <div class="container">
        <div class="header">
            <h1 id="app-title">香港電車歷史練習</h1>
            <button class="lang-btn" onclick="toggleLanguage()" id="lang-btn">繁 / 简</button>
        </div>

        <div id="content-area">
            <!-- 動態渲染區 -->
        </div>
    </div>

    <script>
        // --- 題庫與文本數據 (修改第二題D選項為「搬走」) ---
        const data = {
            tc: {
                title: "香港電車歷史練習",
                namePrompt: "請輸入您的名字以開始練習：",
                startBtn: "開始練習",
                nameAlert: "請先輸入名字！",
                studentLabel: "同學：",
                part1Title: "一、連連看",
                part1Desc: "請先點選左側年份，再點選右側正確的事件進行配對。",
                part2Title: "二、選擇題",
                finishTitle: "恭喜完成！",
                finishDesc: "您已順利完成所有練習題！",
                hintPrefix: "提示：",
                correctMsg: "正確！",
                matchNextMsg: "連連看完成！",
                matchLeft:[
                    { id: 1, text: "1965年", hint: "加了拖卡" },
                    { id: 2, text: "1982年", hint: "拖卡停用" },
                    { id: 3, text: "1972年", hint: "座位等級制度" },
                    { id: 4, text: "1976年", hint: "一人控制模式" },
                    { id: 5, text: "1986年", hint: "全面翻新" },
                    { id: 6, text: "1989年", hint: "搬到屈地街" }
                ],
                matchRight:[
                    { id: 3, text: "取消了座位等級制度" },
                    { id: 6, text: "電車的車廠從銅鑼灣搬到屈地街，原來的地點變成了時代廣場" },
                    { id: 1, text: "雙層電車後面加上了拖卡" },
                    { id: 4, text: "開始實行一人控制模式" },
                    { id: 2, text: "電車後面的拖卡全部停用了" },
                    { id: 5, text: "電車進行全面翻新，包括將上層座位換成塑膠" }
                ],
                mcq:[
                    { q: "1. 拖卡被電車公司定為甚麼等級的車廂？", options:["A. 二等車廂", "B. 頭等車廂", "C. 免費車廂", "D. 普通車廂"], ans: 1, hint: "頭等" },
                    { q: "2. 為甚麼電車公司在1965年要加上拖卡？", options:["A. 為了減少噪音", "B. 為了滿足更多人的出行需求", "C. 為了讓電車跑得更快", "D. 為了方便車廠搬走"], ans: 1, hint: "出行需求" },  // 改為搬走
                    { q: "3. 文章用「沙丁魚罐頭」來比喻甚麼？", options:["A. 拖卡的外形", "B. 擠滿人的電車", "C. 電車的噪音", "D. 舊式火車的車廂"], ans: 1, hint: "擠滿" },
                    { q: "4. 拖卡雖然很受歡迎，但最終在1982年全部停用的主要原因是甚麼？", options:["A. 乘客太少", "B. 座位等級制度取消", "C. 噪音問題很難解決", "D. 車廠搬到屈地街"], ans: 2, hint: "噪音" },
                    { q: "5. 文章提到從1986年起，電車公司對電車做了全面翻新，其中包括甚麼具體改變？", options:["A. 把拖卡重新加上去", "B. 將上層座位換成塑膠", "C. 取消一人控制模式", "D. 把車廠搬回銅鑼灣"], ans: 1, hint: "塑膠" },
                    { q: "6. 文章最後把今天的香港電車形容為「古老而珍貴的交通工具」，這句話最可能表達了作者的甚麼態度？", options:["A. 覺得電車已經過時，應該淘汰", "B. 對電車的歷史和價值感到懷念和珍惜", "C. 希望電車公司再引入拖卡", "D. 認為電車只適合年輕人乘坐"], ans: 1, hint: "珍惜" }
                ]
            },
            sc: {
                title: "香港电车历史练习",
                namePrompt: "请输入您的名字以开始练习：",
                startBtn: "开始练习",
                nameAlert: "请先输入名字！",
                studentLabel: "同学：",
                part1Title: "一、连连看",
                part1Desc: "请先点选左侧年份，再点选右侧正确的事件进行配对。",
                part2Title: "二、选择题",
                finishTitle: "恭喜完成！",
                finishDesc: "您已顺利完成所有练习题！",
                hintPrefix: "提示：",
                correctMsg: "正确！",
                matchNextMsg: "连连看完成！",
                matchLeft:[
                    { id: 1, text: "1965年", hint: "加了拖卡" },
                    { id: 2, text: "1982年", hint: "拖卡停用" },
                    { id: 3, text: "1972年", hint: "座位等级制度" },
                    { id: 4, text: "1976年", hint: "一人控制模式" },
                    { id: 5, text: "1986年", hint: "全面翻新" },
                    { id: 6, text: "1989年", hint: "搬到屈地街" }
                ],
                matchRight:[
                    { id: 3, text: "取消了座位等级制度" },
                    { id: 6, text: "电车的车厂从铜锣湾搬到屈地街，原来的地点变成了时代广场" },
                    { id: 1, text: "双层电车后面加上了拖卡" },
                    { id: 4, text: "开始实行一人控制模式" },
                    { id: 2, text: "电车后面的拖卡全部停用了" },
                    { id: 5, text: "电车进行全面翻新，包括将上层座位换成塑胶" }
                ],
                mcq:[
                    { q: "1. 拖卡被电车公司定为什么等级的车厢？", options:["A. 二等车厢", "B. 头等车厢", "C. 免费车厢", "D. 普通车厢"], ans: 1, hint: "头等" },
                    { q: "2. 为什么电车公司在1965年要加上拖卡？", options:["A. 为了减少噪音", "B. 为了满足更多人的出行需求", "C. 为了让电车跑得更快", "D. 为了方便车厂搬走"], ans: 1, hint: "出行需求" },  // 改為搬走
                    { q: "3. 文章用“沙丁鱼罐头”来比喻什么？", options:["A. 拖卡的外形", "B. 挤满人的电车", "C. 电车的噪音", "D. 旧式火车的车厢"], ans: 1, hint: "挤满" },
                    { q: "4. 拖卡虽然很受欢迎，但最终在1982年全部停用的主要原因是什么？", options:["A. 乘客太少", "B. 座位等级制度取消", "C. 噪音问题很难解决", "D. 车厂搬到屈地街"], ans: 2, hint: "噪音" },
                    { q: "5. 文章提到从1986年起，电车公司对电车做了全面翻新，其中包括什么具体改变？", options:["A. 把拖卡重新加上去", "B. 将上层座位换成塑胶", "C. 取消一人控制模式", "D. 把车厂搬回铜锣湾"], ans: 1, hint: "塑胶" },
                    { q: "6. 文章最后把今天的香港电车形容为“古老而珍贵的交通工具”，这句话最可能表达了作者的什么态度？", options:["A. 觉得电车已经过时，应该淘汰", "B. 对电车的历史和价值感到怀念和珍惜", "C. 希望电车公司再引入拖卡", "D. 认为电车只适合年轻人乘坐"], ans: 1, hint: "珍惜" }
                ]
            }
        };

        // --- 狀態變量 ---
        let lang = 'tc'; 
        let studentName = '';
        let currentStep = 'login'; // login, match, mcq, done
        
        // Match 狀態
        let selectedLeftId = null;
        let matchedPairs =[];

        // MCQ 狀態
        let currentMcqIndex = 0;

        // --- 核心函數 ---

        function getDict() {
            return data[lang];
        }

        function toggleLanguage() {
            lang = lang === 'tc' ? 'sc' : 'tc';
            document.getElementById('lang-btn').innerText = lang === 'tc' ? '繁 / 简' : '简 / 繁';
            document.getElementById('app-title').innerText = getDict().title;
            render();
        }

        function showToast(msg, isSuccess = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            if (isSuccess) {
                toast.classList.add('success');
            } else {
                toast.classList.remove('success');
            }
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // 手動進入選擇題
        function goToMcq() {
            currentStep = 'mcq';
            render();
        }

        // 輔助：生成時間線回顧HTML (用於match完成或done)
        function generateTimelineReview(dict) {
            const events = dict.matchLeft.map(item => {
                const rightItem = dict.matchRight.find(r => r.id === item.id);
                return {
                    year: item.text,
                    event: rightItem ? rightItem.text : '',
                    id: item.id
                };
            });
            // 按年份數字排序
            events.sort((a, b) => {
                const numA = parseInt(a.year.match(/\d+/)[0], 10);
                const numB = parseInt(b.year.match(/\d+/)[0], 10);
                return numA - numB;
            });
            const reviewTitle = lang === 'tc' ? '📅 按時間順序回顧' : '📅 按时间顺序回顾';
            const reviewItems = events.map(e => 
                `<div class="review-item">${e.year} — ${e.event}</div>`
            ).join('');
            return `
                <div class="review-section">
                    <div class="review-title">${reviewTitle}</div>
                    ${reviewItems}
                </div>
            `;
        }

        // 輔助：生成選擇題正確答案回顧HTML
        function generateMcqReview(dict) {
            const reviewTitle = lang === 'tc' ? '📝 選擇題正確答案' : '📝 选择题正确答案';
            const items = dict.mcq.map((q, index) => {
                const correctOption = q.options[q.ans];
                return `
                    <div class="mcq-review-item">
                        <div class="mcq-review-question">${q.q}</div>
                        <div class="mcq-review-answer">${correctOption}</div>
                    </div>
                `;
            }).join('');
            return `
                <div class="review-section" style="margin-top:20px;">
                    <div class="review-title">${reviewTitle}</div>
                    ${items}
                </div>
            `;
        }

        // --- 渲染邏輯 ---
        function render() {
            const content = document.getElementById('content-area');
            const dict = getDict();
            
            if (currentStep === 'login') {
                content.innerHTML = `
                    <div class="login-screen">
                        <h2>${dict.namePrompt}</h2>
                        <input type="text" id="student-name-input" placeholder="...">
                        <br>
                        <button class="btn" onclick="startExercise()">${dict.startBtn}</button>
                    </div>
                `;
                if(studentName) document.getElementById('student-name-input').value = studentName;
            } 
            else if (currentStep === 'match') {
                let leftHtml = '';
                let rightHtml = '';

                dict.matchLeft.forEach(item => {
                    const isMatched = matchedPairs.includes(item.id);
                    const isSelected = selectedLeftId === item.id;
                    let classes = 'match-item';
                    if (isMatched) classes += ' matched';
                    else if (isSelected) classes += ' selected';

                    leftHtml += `<div class="${classes}" onclick="selectLeft(${item.id})">${item.text}</div>`;
                });

                dict.matchRight.forEach(item => {
                    const isMatched = matchedPairs.includes(item.id);
                    let classes = 'match-item';
                    if (isMatched) classes += ' matched';

                    rightHtml += `<div class="${classes}" onclick="selectRight(${item.id})">${item.text}</div>`;
                });

                // 如果全部配對完成，產生回顧區塊 + 手動進入按鈕
                let reviewHtml = '';
                let nextButtonHtml = '';
                
                if (matchedPairs.length === dict.matchLeft.length) {
                    reviewHtml = generateTimelineReview(dict);
                    const buttonText = lang === 'tc' ? '進入選擇題 🚋' : '进入选择题 🚋';
                    nextButtonHtml = `
                        <div class="next-button-wrapper">
                            <button class="btn" onclick="goToMcq()">${buttonText}</button>
                        </div>
                    `;
                }

                content.innerHTML = `
                    <div class="student-name-display">${dict.studentLabel} ${studentName}</div>
                    <div class="section-title">${dict.part1Title}</div>
                    <div class="section-desc">${dict.part1Desc}</div>
                    <div class="match-container">
                        <div class="match-col">${leftHtml}</div>
                        <div class="match-col">${rightHtml}</div>
                    </div>
                    ${reviewHtml}
                    ${nextButtonHtml}
                `;
            }
            else if (currentStep === 'mcq') {
                const qData = dict.mcq[currentMcqIndex];
                let optionsHtml = '';
                qData.options.forEach((opt, index) => {
                    optionsHtml += `<div class="mcq-option" onclick="selectMcq(${index})">${opt}</div>`;
                });

                content.innerHTML = `
                    <div class="student-name-display">${dict.studentLabel} ${studentName}</div>
                    <div class="section-title">${dict.part2Title}</div>
                    <div class="section-desc">進度： ${currentMcqIndex + 1} / ${dict.mcq.length}</div>
                    <div class="mcq-question">${qData.q}</div>
                    <div class="mcq-options">${optionsHtml}</div>
                `;
            }
            else if (currentStep === 'done') {
                // 完成畫面：顯示時間線回顧 + 選擇題正確答案
                const timelineHtml = generateTimelineReview(dict);
                const mcqReviewHtml = generateMcqReview(dict);
                const finishTitle = dict.finishTitle;
                const finishDesc = `${studentName}${dict.studentLabel.replace('：','')}，${dict.finishDesc}`;

                content.innerHTML = `
                    <div class="finish-container">
                        <div class="finish-header">
                            <h2 style="color: var(--success);">${finishTitle}</h2>
                            <p>${finishDesc}</p>
                        </div>
                        ${timelineHtml}
                        ${mcqReviewHtml}
                    </div>
                `;
            }
        }

        // --- 交互邏輯 ---
        function startExercise() {
            const input = document.getElementById('student-name-input').value.trim();
            if (!input) {
                showToast(getDict().nameAlert);
                return;
            }
            studentName = input;
            currentStep = 'match';
            render();
        }

        function selectLeft(id) {
            if (matchedPairs.includes(id)) return;
            selectedLeftId = id;
            render();
        }

        function selectRight(rightId) {
            if (matchedPairs.includes(rightId)) return;
            
            if (selectedLeftId === null) {
                return;
            }

            const dict = getDict();
            if (selectedLeftId === rightId) {
                matchedPairs.push(rightId);
                selectedLeftId = null;
                showToast(dict.correctMsg, true);
                render();

                if (matchedPairs.length === dict.matchLeft.length) {
                    showToast(dict.matchNextMsg, true);
                    // 不再自動跳轉
                }
            } else {
                const leftItem = dict.matchLeft.find(item => item.id === selectedLeftId);
                showToast(`❌ ${dict.hintPrefix}（${leftItem.hint}）`);
                selectedLeftId = null;
                render();
            }
        }

        function selectMcq(selectedIndex) {
            const dict = getDict();
            const qData = dict.mcq[currentMcqIndex];

            if (selectedIndex === qData.ans) {
                showToast(dict.correctMsg, true);
                setTimeout(() => {
                    currentMcqIndex++;
                    if (currentMcqIndex >= dict.mcq.length) {
                        currentStep = 'done';
                    }
                    render();
                }, 1000);
            } else {
                showToast(`❌ ${dict.hintPrefix}（${qData.hint}）`);
            }
        }

        // 初始化
        document.getElementById('app-title').innerText = getDict().title;
        render();
    </script>
</body>
</html>
