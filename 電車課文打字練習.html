<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚋 叮叮 · 电车打字练习</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #fdeff2 0%, #fff4e6 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Chalkboard SE', '幼圆', 'Yuanti SC', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background-color: rgba(255, 250, 240, 0.7);
            backdrop-filter: blur(3px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 35px rgba(233, 186, 143, 0.3), 0 8px 15px rgba(0,0,0,0.1);
            padding: 30px 35px;
            border: 3px solid #ffcfb3;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: "🚃 🚋 🚎";
            font-size: 2.2rem;
            position: absolute;
            top: -10px;
            right: 20px;
            opacity: 0.2;
            transform: rotate(5deg);
            white-space: nowrap;
            pointer-events: none;
        }

        .container::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: repeating-linear-gradient(45deg, #ffbba0 0px, #ffbba0 15px, #ffe0b5 15px, #ffe0b5 30px);
            border-radius: 0 0 40px 40px;
            opacity: 0.6;
        }

        h1 {
            font-size: 2.6rem;
            color: #b1543c;
            text-shadow: 3px 3px 0 #ffd0b0;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 span {
            font-size: 1.8rem;
            background: #ffdec5;
            padding: 0.2rem 1.2rem;
            border-radius: 50px;
            color: #794b3a;
            border: 2px dotted #e0866e;
        }

        .mode-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 15px 0 20px;
            justify-content: center;
        }

        .mode-btn {
            background: #fff9f0;
            border: 3px solid #fbbb92;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #784a32;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 #dd9879;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .mode-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #dd9879;
            background: #ffe3d1;
        }

        .mode-btn.active {
            background: #fecab0;
            border-color: #e0582c;
            color: #4d2f1f;
            box-shadow: 0 5px 0 #b34f2d;
            transform: translateY(2px);
        }

        .name-section {
            background: #fff6e8;
            border-radius: 50px;
            padding: 15px 25px;
            margin: 15px 0 25px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border: 3px solid #fec7a5;
            box-shadow: 0 8px 0 #e4a886;
        }

        .name-label {
            font-size: 1.4rem;
            color: #974f34;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .name-input {
            border: 3px solid #ff8a6c;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 1.3rem;
            background: #fffaf2;
            width: 220px;
            outline: none;
            transition: 0.1s;
            font-family: inherit;
            color: #4d2f1f;
        }

        .name-input:focus {
            border-color: #e0582c;
            box-shadow: 0 0 0 4px #ffd5bd;
        }

        .start-btn {
            background: #ffb082;
            border: none;
            border-radius: 50px;
            padding: 10px 30px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #4f2b19;
            border-bottom: 5px solid #b45f3a;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 0 #b45f3a;
        }

        .start-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        .start-btn:disabled {
            opacity: 0.5;
            transform: none;
            pointer-events: none;
        }

        .tram-card {
            background: #fffcf5;
            border-radius: 50px 50px 30px 30px;
            padding: 30px 30px 40px;
            border: 4px solid #f8c3a2;
            box-shadow: inset 0 -5px 0 #ffe1c6, 0 15px 20px rgba(236, 157, 106, 0.2);
            margin: 20px 0 20px;
        }

        .passage {
            font-size: 1.3rem;
            line-height: 2.5rem;
            color: #2d3e4f;
            word-break: break-word;
        }

        .passage p {
            margin-bottom: 1.8rem;
            background: rgba(255, 239, 224, 0.4);
            padding: 15px 20px;
            border-radius: 35px;
            border: 2px dashed #fec89a;
        }

        .blank-input {
            display: inline-block;
            width: auto;
            min-width: 100px;
            max-width: 180px;
            background-color: #fff0f0;
            border: 3px solid #ff6f6f;
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            font-size: 1.2rem;
            font-family: inherit;
            text-align: center;
            color: #a63535;
            box-shadow: 0 4px 0 #b14545, inset 0 2px 5px #ffe0e0;
            transition: 0.1s;
            margin: 0 4px;
            vertical-align: middle;
        }

        .blank-input:focus {
            outline: none;
            background-color: #fff5e0;
            border-color: #ff3737;
            box-shadow: 0 4px 0 #a12b2b, inset 0 2px 8px #ffc5c5;
        }

        .blank-input:disabled {
            background-color: #f5e0d0;
            border-color: #dib9a0;
            box-shadow: none;
            opacity: 0.8;
            cursor: not-allowed;
        }

        .blank-input.incorrect {
            text-decoration: line-through;
            text-decoration-color: #b30000;
            text-decoration-thickness: 3px;
            background-color: #ffe0e0;
            border-color: #b30000;
        }

        .blank-input::placeholder {
            color: #dba1a1;
            font-style: italic;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .correct-hint {
            display: inline-block;
            background-color: #ffeaa6;
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            margin-left: 8px;
            font-size: 1rem;
            font-weight: 600;
            color: #a5431e;
            border: 2px solid #f9b953;
            vertical-align: middle;
            box-shadow: 0 2px 0 #b57c2a;
            white-space: nowrap;
        }

        .submit-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin: 25px 0 15px;
        }

        .submit-btn {
            background: #ffb347;
            border: none;
            border-radius: 60px;
            padding: 15px 40px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #382010;
            border-bottom: 6px solid #b15f1f;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 7px 0 #b15f1f;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }

        .score-display {
            background: #e8ffe8;
            border-radius: 50px;
            padding: 10px 30px;
            font-size: 2rem;
            font-weight: bold;
            color: #2f6b2f;
            border: 4px solid #9fd79f;
            box-shadow: 0 5px 0 #6ba26b;
        }

        .tram-footer {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 2rem;
            filter: drop-shadow(2px 6px 0 #feb183);
        }

        .hint-msg {
            text-align: center;
            color: #b76248;
            font-weight: 500;
            background: #ffebd2;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 1.1rem;
            border: 2px solid #ffa27a;
            margin: 20px 0 0;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 动态标题 -->
    <h1 id="mainTitle">
        🚋 叮叮 · 电车打字练习
        <span>挖空填词</span>
    </h1>

    <!-- 模式切换按钮：只有繁体和简体 -->
    <div class="mode-bar">
        <div class="mode-btn" data-mode="cht">📜 繁体</div>
        <div class="mode-btn" data-mode="chs">🇨🇳 简体</div>
    </div>

    <!-- 姓名与开始练习 -->
    <div class="name-section">
        <span class="name-label" id="nameLabel">👧🧒 我的名字：</span>
        <input type="text" id="studentName" class="name-input" placeholder="例如：小叮叮" autocomplete="off">
        <button id="startPracticeBtn" class="start-btn">🚋 开始练习</button>
    </div>

    <!-- 文章展示区 -->
    <div class="tram-card">
        <div class="passage" id="passageContainer">
            <!-- 动态渲染 -->
        </div>
    </div>

    <!-- 提交分数区域 -->
    <div class="submit-area">
        <button id="submitBtn" class="submit-btn">✅ 提交答案 · 算分</button>
        <div id="scoreDisplay" class="score-display">0 / 0</div>
    </div>

    <!-- 提示信息 -->
    <div class="hint-msg" id="hintMessage">
        ⭐ 红色框里打字填空～ 先输入名字并点击“开始练习”才能填写哦！
    </div>

    <div class="tram-footer">
        <span>🚋</span><span>🚎</span><span>🚃</span><span>🚋</span><span>🚃</span>
    </div>
</div>

<script>
(function() {
    // ---------- 繁体模板 (严格按照要求挖空) ----------
    const tradTemplate = `香港的電車{{歷史悠久}}，它的問世已是一百年前的事；隨著社會的發展，電車在數目和設計上，都不斷轉變。

1904年，香港開始使用電車。最初的路線是由灣仔的軍器廠街出發，經過銅鑼灣、天后、炮台山等地，最後到達筲箕灣，還有一條{{支線}}通往跑馬地。剛開始時，電車是從英國{{進口}}的單層車，長29英尺，寬6英尺1英寸。到了1912年，香港出現了雙層電車。最早的雙層電車是由單層車{{改裝}}而成的，下層有木椅子，中間有一個樓梯通向上層，上層也有木椅子，但沒有{{頂蓋}}。後來因為乘客{{抱怨}}上層沒{{頂蓋}}，電車公司就在上面加了一個帆布{{帳篷}}；到1923年，電車上層有了{{固定}}的木質{{頂蓋}}。

1941年日軍{{佔領}}香港{{期間}}，許多電車被破壞。戰後，電車公司從英國{{訂購}}零件來修理並增加車輛，使得電車數量達到127輛；到了六十年代初，電車總數增加到159輛，之後還有三輛在香港制造的新電車加入服務。

可能只有年紀大的香港人才記得，以前電車後面還有拖卡。所謂拖卡，就是電車後面的一個小型{{車廂}}。1965年，為了{{滿足}}更多人的出行需求，電車公司在雙層電車後面加上了拖卡，並且把拖卡定為{{頭等}}{{車廂}}。那時候，文學作品裡常把{{擠滿}}人的電車比作沙丁魚{{罐頭}}。拖卡就像{{舊式}}火車的一節小{{車廂}}一樣掛在電車尾部。雖然大家很喜歡坐拖卡，但由於{{噪音}}問題很難解決，{{最終}}在1982年全部{{停用}}了。

隨著時間的發展，電車也發生了很多改變。比如1972年{{取消}}了座位{{等級}}{{制度}}，1976年開始{{實行}}一人控制{{模式}}。從1986年起，電車公司逐漸對所有電車進行了全面{{翻新}}，其中包括將上層座位換成{{塑膠}}。1989年，電車的車廠從銅鑼灣搬到屈地街，原來的地點改成了時代廣場。對於今天的香港來說，電車已經成為一種古老而{{珍貴}}的交通工具。`;

    // ---------- 简体模板 (对应挖空词简体) ----------
    const simpTemplate = `香港的电车{{历史悠久}}，它的问世已是一百年前的事；随着社会的发展，电车在数目和设计上，都不断转变。

1904年，香港开始使用电车。最初的路线是由湾仔的军器厂街出发，经过铜锣湾、天后、炮台山等地，最后到达筲箕湾，还有一条{{支线}}通往跑马地。刚开始时，电车是从英国{{进口}}的单层车，长29英尺，宽6英尺1英寸。到了1912年，香港出现了双层电车。最早的双层电车是由单层车{{改装}}而成的，下层有木椅子，中间有一个楼梯通向上层，上层也有木椅子，但没有{{顶盖}}。后来因为乘客{{抱怨}}上层没{{顶盖}}，电车公司就在上面加了一个帆布{{帐篷}}；到1923年，电车上层有了{{固定}}的木质{{顶盖}}。

1941年日军{{占领}}香港{{期间}}，许多电车被破坏。战后，电车公司从英国{{订购}}零件来修理并增加车辆，使得电车数量达到127辆；到了六十年代初，电车总数增加到159辆，之后还有三辆在香港制造的新电车加入服务。

可能只有年纪大的香港人才记得，以前电车后面还有拖卡。所谓拖卡，就是电车后面的一个小型{{车厢}}。1965年，为了{{满足}}更多人的出行需求，电车公司在双层电车后面加上了拖卡，并且把拖卡定为{{头等}}{{车厢}}。那时候，文学作品里常把{{挤满}}人的电车比作沙丁鱼{{罐头}}。拖卡就像{{旧式}}火车的一节小{{车厢}}一样挂在电车尾部。虽然大家很喜欢坐拖卡，但由于{{噪音}}问题很难解决，{{最终}}在1982年全部{{停用}}了。

随着时间的发展，电车也发生了很多改变。比如1972年{{取消}}了座位{{等级}}{{制度}}，1976年开始{{实行}}一人控制{{模式}}。从1986年起，电车公司逐渐对所有电车进行了全面{{翻新}}，其中包括将上层座位换成{{塑胶}}。1989年，电车的车厂从铜锣湾搬到屈地街，原来的地点改成了时代广场。对于今天的香港来说，电车已经成为一种古老而{{珍贵}}的交通工具。`;

    // 标题繁简映射
    const titleMap = {
        'cht': '🚋 叮叮 · 電車打字練習',
        'chs': '🚋 叮叮 · 电车打字练习'
    };
    const subMap = {
        'cht': '挖空填詞',
        'chs': '挖空填词'
    };

    // 界面文本繁简映射
    const uiTextMap = {
        'cht': {
            nameLabel: '👧🧒 我的名字：',
            startBtn: '🚋 開始練習',
            submitBtn: '✅ 提交答案 · 算分',
            hintMsg: '⭐ 紅色框裡打字填空～ 先輸入名字並點擊“開始練習”才能填寫哦！',
            placeholder: '✍️ 填寫'   // 挖空内的提示文字（繁体）
        },
        'chs': {
            nameLabel: '👧🧒 我的名字：',
            startBtn: '🚋 开始练习',
            submitBtn: '✅ 提交答案 · 算分',
            hintMsg: '⭐ 红色框里打字填空～ 先输入名字并点击“开始练习”才能填写哦！',
            placeholder: '✍️ 填空'   // 挖空内的提示文字（简体）
        }
    };

    // ---------- 全局变量 ----------
    let currentMode = 'cht';               // 默认繁体
    let practiceStarted = false;           // 是否已开始练习（输入框启用）

    const passageDiv = document.getElementById('passageContainer');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const nameInput = document.getElementById('studentName');
    const startBtn = document.getElementById('startPracticeBtn');
    const submitBtn = document.getElementById('submitBtn');
    const scoreSpan = document.getElementById('scoreDisplay');
    const mainTitle = document.getElementById('mainTitle');
    const nameLabel = document.getElementById('nameLabel');
    const hintMsg = document.getElementById('hintMessage');

    // ---------- 辅助函数 ----------
    function clearAllHints() {
        document.querySelectorAll('.correct-hint').forEach(el => el.remove());
        document.querySelectorAll('.blank-input').forEach(inp => {
            inp.classList.remove('incorrect');
        });
    }

    function clearAllInputs() {
        document.querySelectorAll('.blank-input').forEach(inp => {
            inp.value = '';
        });
    }

    function setInputsEnabled(enabled) {
        document.querySelectorAll('.blank-input').forEach(inp => {
            inp.disabled = !enabled;
        });
    }

    function resetPractice() {
        clearAllHints();
        clearAllInputs();
        setInputsEnabled(true);
        const total = document.querySelectorAll('.blank-input').length;
        scoreSpan.textContent = `0 / ${total}`;
    }

    // ---------- 更新标题和界面文字 ----------
    function updateUILanguage(mode) {
        const texts = uiTextMap[mode];
        nameLabel.innerHTML = texts.nameLabel;
        startBtn.innerHTML = texts.startBtn;
        submitBtn.innerHTML = texts.submitBtn;
        hintMsg.innerHTML = texts.hintMsg;

        // 更新主标题
        const main = titleMap[mode] || '🚋 叮叮 · 电车打字练习';
        const sub = subMap[mode] || '挖空填词';
        mainTitle.innerHTML = `${main} <span>${sub}</span>`;
    }

    // ---------- 渲染文章：根据模式，并传入当前模式的placeholder ----------
    function renderPassage(mode) {
        const template = (mode === 'chs') ? simpTemplate : tradTemplate;
        const placeholderText = uiTextMap[mode].placeholder;  // 获取当前模式下的提示文字

        const paragraphs = template.split(/\n\s*\n/);
        let htmlContent = '';

        paragraphs.forEach(para => {
            if (!para.trim()) return;
            const regex = /({{[^}]+}})|([^{]+)/g;
            let match;
            let paraHTML = '';

            while ((match = regex.exec(para)) !== null) {
                const fullMatch = match[0];
                if (fullMatch.startsWith('{{') && fullMatch.endsWith('}}')) {
                    const word = fullMatch.slice(2, -2);
                    // 使用动态placeholder
                    paraHTML += `<input type="text" class="blank-input" data-answer="${word}" placeholder="${placeholderText}" autocomplete="off">`;
                } else {
                    paraHTML += fullMatch;
                }
            }
            htmlContent += `<p>${paraHTML}</p>`;
        });

        passageDiv.innerHTML = htmlContent;
        if (!practiceStarted) {
            setInputsEnabled(false);
        }
        const total = document.querySelectorAll('.blank-input').length;
        scoreSpan.textContent = `0 / ${total}`;
    }

    function setActiveButton(mode) {
        modeBtns.forEach(btn => {
            const btnMode = btn.dataset.mode;
            btn.classList.toggle('active', btnMode === mode);
        });
    }

    // ---------- 开始练习 ----------
    function startPractice() {
        const name = nameInput.value.trim();
        if (name === '') {
            alert('👧🧒 请先输入名字再开始练习吧～');
            return;
        }
        practiceStarted = true;
        resetPractice();
    }

    // ---------- 提交计分 ----------
    function calculateScore() {
        if (!practiceStarted) {
            alert('请先输入姓名并点击“开始练习”再提交答案哟 ✍️');
            return;
        }
        clearAllHints();

        const inputs = document.querySelectorAll('.blank-input');
        let correct = 0;
        inputs.forEach(inp => {
            const answer = inp.dataset.answer.trim();
            const userValue = inp.value.trim();
            if (userValue === answer) {
                correct++;
            } else {
                inp.classList.add('incorrect');
                const hintSpan = document.createElement('span');
                hintSpan.className = 'correct-hint';
                hintSpan.textContent = `✔️ ${answer}`;
                inp.insertAdjacentElement('afterend', hintSpan);
            }
        });
        const total = inputs.length;
        scoreSpan.textContent = `${correct} / ${total}`;
        setInputsEnabled(false);

        const studentName = nameInput.value.trim() || '同学';
        if (correct === total) {
            alert(`🎉 哇！${studentName} 太棒啦，满分叮叮！`);
        } else {
            alert(`📝 ${studentName}，得分 ${correct}/${total} ，错误处已标注正确答案。`);
        }
    }

    // ---------- 事件绑定 ----------
    modeBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            const mode = e.currentTarget.dataset.mode;
            if (!mode) return;
            currentMode = mode;
            renderPassage(currentMode);
            setActiveButton(currentMode);
            updateUILanguage(currentMode);
            practiceStarted = false;  // 切换模式后需重新开始练习
        });
    });

    startBtn.addEventListener('click', startPractice);
    submitBtn.addEventListener('click', calculateScore);

    // 初始化
    renderPassage(currentMode);
    setActiveButton(currentMode);
    updateUILanguage(currentMode);
    setInputsEnabled(false);
})();
</script>
</body>
</html>
